services:
  node-red:
    image: calibr8/nr:${NODERED_VERSION}
    container_name: nodered
    networks:
      - helios-net
    ports:
      - ${NODERED_PORT}:1880
    environment:
      - NODE_VERSION=${NODERED_ENV_NODE_VERSION}
      - TZ=${NODERED_ENV_TZ}
    volumes:
      - ${HELIOS_VOLUME}/nodered:/root
    depends_on:
      - helios-api
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: pgadmin
    networks:
      - helios-net
    ports:
      - ${PGADMIN_PORT}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_ENV_PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_ENV_PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - helios-configdb
      - helios-timescale
    restart: unless-stopped

  helios-configdb:
    image: calibr8/helios-configdb:${HELIOSCONFIGDB_VERSION}
    container_name: helios-configdb
    networks:
      - helios-net
    ports:
      - ${HELIOSCONFIGDB_PORT}:5432
    environment:
      POSTGRES_USER: ${HELIOSCONFIGDB_ENV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${HELIOSCONFIGDB_ENV_POSTGRES_PASSWORD}
      POSTGRES_DB: ${HELIOSCONFIGDB_ENV_POSTGRES_DB}
    volumes:
      - ${HELIOS_VOLUME}/configdb:/var/lib/postgresql/data
    restart: unless-stopped

  helios-timescale:
    image: calibr8/helios-timescale:${HELIOSTIMESCALE_VERSION}
    container_name: helios-timescale
    networks:
      - helios-net
    ports:
      - ${HELIOSTIMESCALE_PORT}:5432
    environment:
      POSTGRES_USER: ${HELIOSTIMESCALE_ENV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${HELIOSTIMESCALE_ENV_POSTGRES_PASSWORD}
      POSTGRES_DB: ${HELIOSTIMESCALE_ENV_POSTGRES_DB}
    volumes:
      - ${HELIOS_VOLUME}/timescale:/var/lib/postgresql/data
    restart: unless-stopped

  helios-ui:
    image: calibr8/helios-ui:${HELIOSUI_VERSION}
    container_name: helios-ui
    networks:
      - helios-net
    ports:
      - ${HELIOSUI_PORT}:15433
    depends_on:
      - helios-api
    restart: unless-stopped

  helios-api:
    image: calibr8/helios-api:${HELIOSAPI_VERSION}
    container_name: helios-api
    networks:
      - helios-net
    ports:
      - ${HELIOSAPI_PORT}:15434
    depends_on:
      - helios-configdb
    restart: unless-stopped

  eds:
    image: calibr8/edgedatastore:${EDS_VERSION}
    container_name: eds
    networks:
      - helios-net
    ports:
      - ${EDS_PORT}:5591
    volumes:
      - ${HELIOS_VOLUME}/edgedatastore:/usr/share/OSIsoft/
    restart: unless-stopped

  tseds-bridge:
    image: calibr8/tseds-bridge:${TSEDSBRIDGE_VERSION}
    container_name: tseds-bridge
    networks:
      - helios-net
    depends_on:
      - eds
      - helios-timescale
      - helios-api
    restart: unless-stopped

  uptimekuma:
    image: louislam/uptime-kuma:${UPTIMEKUMA_VERSION}
    container_name: uptimekuma
    networks:
      - helios-net
    ports:
      - ${UPTIMEKUMA_PORT}:3001
    volumes:
      - ${HELIOS_VOLUME}/uptimekuma:/app/data
    restart: unless-stopped


networks:
  helios-net:
    name: helios-net
    driver: bridge